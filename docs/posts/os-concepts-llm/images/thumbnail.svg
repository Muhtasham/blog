<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow-os" cx="50%" cy="50%" r="46%">
      <stop offset="0%" stop-color="#3d1a00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <marker id="arr-os" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 0 6, 7 3" fill="#f59e0b"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 0 6, 7 3" fill="#22c55e"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 0 6, 7 3" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="800" height="800" fill="#0d1117"/>
  <rect width="800" height="800" fill="url(#glow-os)"/>

  <!-- Title -->
  <text x="400" y="60" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="4">OS CONCEPTS IN LLMs</text>
  <text x="400" y="82" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" text-anchor="middle" letter-spacing="3">VIRTUAL MEMORY  ·  PAGING  ·  BRANCH PREDICTION</text>

  <!-- ── Centre divider ──────────────────────────────────────────── -->
  <line x1="400" y1="100" x2="400" y2="530" stroke="#f59e0b" stroke-width="0.75" opacity="0.18" stroke-dasharray="6 4"/>

