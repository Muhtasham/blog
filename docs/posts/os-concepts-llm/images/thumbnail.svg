    <rect x="72" y="196" width="80" height="20" rx="2" fill="#1c0f00" stroke="#f59e0b" stroke-width="0.75"/>
    <text x="112" y="211" fill="#f59e0b" text-anchor="middle">2 → frm 1</text>
    <rect x="72" y="220" width="80" height="20" rx="2" fill="#3d1a00" stroke="#fbbf24" stroke-width="1"/>
    <text x="112" y="235" fill="#fbbf24" text-anchor="middle">3 → frm 5 ★</text>
    <rect x="72" y="244" width="80" height="20" rx="2" fill="#1c0f00" stroke="#f59e0b" stroke-width="0.75"/>
    <text x="112" y="259" fill="#f59e0b" text-anchor="middle">4 → frm 2</text>
    <rect x="72" y="268" width="80" height="20" rx="2" fill="#1c0f00" stroke="#f59e0b" stroke-width="0.75"/>
    <text x="112" y="283" fill="#f59e0b" text-anchor="middle">5 → frm 9</text>
    <rect x="72" y="292" width="80" height="20" rx="2" fill="#1c0f00" stroke="#f59e0b" stroke-width="0.75"/>
    <text x="112" y="307" fill="#f59e0b" text-anchor="middle">6 → frm 6</text>
    <rect x="72" y="316" width="80" height="20" rx="2" fill="#1c0f00" stroke="#f59e0b" stroke-width="0.75"/>
    <text x="112" y="331" fill="#f59e0b" text-anchor="middle">7 → frm 4</text>
  </g>

  <!-- Arrow →  -->
  <line x1="164" y1="236" x2="192" y2="236" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-os)"/>

