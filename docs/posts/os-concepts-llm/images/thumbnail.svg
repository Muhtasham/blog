    <rect x="206" y="196" width="88" height="20" rx="2" fill="#3d1a00" stroke="#fbbf24" stroke-width="1"/>
    <text x="250" y="211" fill="#fbbf24" text-anchor="middle">K[2] V[2] ←</text>
    <rect x="206" y="220" width="88" height="20" rx="2" fill="#1c0f00" stroke="#f59e0b" stroke-width="0.75"/>
    <text x="250" y="235" fill="#f59e0b" text-anchor="middle">K[3] V[3]</text>
    <rect x="206" y="244" width="88" height="20" rx="2" fill="#1c0f00" stroke="#f59e0b" stroke-width="0.75"/>
    <text x="250" y="259" fill="#f59e0b" text-anchor="middle">K[4] V[4]</text>
    <rect x="206" y="268" width="88" height="20" rx="2" fill="#1c0f00" stroke="#f59e0b" stroke-width="0.75"/>
    <text x="250" y="283" fill="#f59e0b" text-anchor="middle">K[5] V[5]</text>
    <rect x="206" y="292" width="88" height="20" rx="2" fill="#051005" stroke="#22c55e" stroke-width="0.75"/>
    <text x="250" y="307" fill="#22c55e" text-anchor="middle">free</text>
    <rect x="206" y="316" width="88" height="20" rx="2" fill="#051005" stroke="#22c55e" stroke-width="0.75"/>
    <text x="250" y="331" fill="#22c55e" text-anchor="middle">free</text>
  </g>

  <!-- vLLM label -->
  <text x="200" y="380" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle">↳ vLLM paged attention</text>
  <!-- punchcard mini-visual -->
  <rect x="62" y="396" width="246" height="60" rx="4" fill="#0a0802" stroke="#78350f" stroke-width="1.5"/>
  <text x="185" y="414" font-family="ui-monospace, monospace" font-size="8" fill="#78350f" text-anchor="middle" letter-spacing="1">PUNCHCARD · OG TOKENIZER</text>
  <g fill="#f59e0b" opacity="0.65">
    <rect x="76"  y="422" width="6" height="9" rx="1"/> <rect x="90"  y="422" width="6" height="9" rx="1"/>
    <rect x="118" y="422" width="6" height="9" rx="1"/> <rect x="146" y="422" width="6" height="9" rx="1"/>
    <rect x="160" y="422" width="6" height="9" rx="1"/> <rect x="188" y="422" width="6" height="9" rx="1"/>
    <rect x="216" y="422" width="6" height="9" rx="1"/> <rect x="272" y="422" width="6" height="9" rx="1"/>
