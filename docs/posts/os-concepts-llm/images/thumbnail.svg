  <rect x="196" y="120" width="108" height="238" rx="5" fill="#0a0d12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="140" font-family="ui-monospace, monospace" font-size="8" fill="#4b5563" text-anchor="middle" letter-spacing="1">KV FRAMES</text>
  <g font-family="ui-monospace, monospace" font-size="9">
    <rect x="206" y="148" width="88" height="20" rx="2" fill="#1c0f00" stroke="#f59e0b" stroke-width="0.75"/>
    <text x="250" y="163" fill="#f59e0b" text-anchor="middle">K[0] V[0]</text>
    <rect x="206" y="172" width="88" height="20" rx="2" fill="#1c0f00" stroke="#f59e0b" stroke-width="0.75"/>
