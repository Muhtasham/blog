<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow-codeclash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b0a0a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-left-codeclash" cx="25%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right-codeclash" cx="75%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="#0d1117"/>
  <rect width="800" height="800" fill="url(#glow-codeclash)"/>
  <rect width="800" height="800" fill="url(#glow-left-codeclash)"/>
  <rect width="800" height="800" fill="url(#glow-right-codeclash)"/>

  <!-- Arena title -->
  <text x="400" y="68" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle" letter-spacing="5">CODECLASH</text>
  <text x="400" y="90" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" text-anchor="middle" letter-spacing="3">COMPETITIVE TRAINING ARENA</text>

  <!-- Battle divider line (center) -->
  <line x1="400" y1="120" x2="400" y2="680" stroke="#ef4444" stroke-width="1" stroke-dasharray="8 6" opacity="0.4"/>

  <!-- Left Agent (Amber) -->
  <circle cx="210" cy="310" r="80" fill="#1a1208" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="210" cy="310" r="64" fill="none" stroke="#f59e0b" stroke-width="0.75" opacity="0.3"/>
  <!-- agent icon left -->
  <circle cx="210" cy="290" r="18" fill="#f59e0b"/>
  <path d="M178 350 C178 322 194 310 210 310 C226 310 242 322 242 350 L242 362 L178 362 Z" fill="#f59e0b"/>
  <text x="210" y="410" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="2">AGENT-A</text>

  <!-- Left agent stats -->
  <rect x="80" y="436" width="240" height="100" rx="6" fill="#0f0e0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="200" y="460" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="2">PERFORMANCE</text>
  <text x="200" y="484" font-family="ui-monospace, monospace" font-size="11" fill="#f59e0b" text-anchor="middle">win_rate: <tspan fill="#fbbf24">0.73</tspan></text>
  <text x="200" y="502" font-family="ui-monospace, monospace" font-size="11" fill="#f59e0b" text-anchor="middle">elo_score: <tspan fill="#fbbf24">1842</tspan></text>
  <text x="200" y="520" font-family="ui-monospace, monospace" font-size="11" fill="#f59e0b" text-anchor="middle">games: <tspan fill="#fbbf24">12,400</tspan></text>

  <!-- Right Agent (Purple) -->
  <circle cx="590" cy="310" r="80" fill="#160d2a" stroke="#8b5cf6" stroke-width="2.5"/>
  <circle cx="590" cy="310" r="64" fill="none" stroke="#8b5cf6" stroke-width="0.75" opacity="0.3"/>
  <!-- agent icon right -->
  <circle cx="590" cy="290" r="18" fill="#8b5cf6"/>
  <path d="M558 350 C558 322 574 310 590 310 C606 310 622 322 622 350 L622 362 L558 362 Z" fill="#8b5cf6"/>
  <text x="590" y="410" font-family="ui-monospace, monospace" font-size="11" font-weight="700" fill="#8b5cf6" text-anchor="middle" letter-spacing="2">AGENT-B</text>

  <!-- Right agent stats -->
  <rect x="480" y="436" width="240" height="100" rx="6" fill="#100a1e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="460" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="2">PERFORMANCE</text>
  <text x="600" y="484" font-family="ui-monospace, monospace" font-size="11" fill="#8b5cf6" text-anchor="middle">win_rate: <tspan fill="#a78bfa">0.71</tspan></text>
  <text x="600" y="502" font-family="ui-monospace, monospace" font-size="11" fill="#8b5cf6" text-anchor="middle">elo_score: <tspan fill="#a78bfa">1789</tspan></text>
  <text x="600" y="520" font-family="ui-monospace, monospace" font-size="11" fill="#8b5cf6" text-anchor="middle">games: <tspan fill="#a78bfa">12,400</tspan></text>

  <!-- VS label -->
  <circle cx="400" cy="310" r="38" fill="#1a0a0a" stroke="#ef4444" stroke-width="2"/>
  <text x="400" y="305" font-family="ui-monospace, monospace" font-size="18" font-weight="700" fill="#ef4444" text-anchor="middle">VS</text>
  <text x="400" y="325" font-family="ui-monospace, monospace" font-size="8" fill="#ef4444" text-anchor="middle" letter-spacing="1">ROUND 47</text>

  <!-- Battle sparks from center -->
  <g stroke="#ef4444" stroke-width="1.5" opacity="0.5">
    <line x1="360" y1="285" x2="330" y2="262"/>
    <line x1="362" y1="310" x2="325" y2="310"/>
    <line x1="360" y1="335" x2="330" y2="358"/>
    <line x1="440" y1="285" x2="470" y2="262"/>
    <line x1="438" y1="310" x2="475" y2="310"/>
    <line x1="440" y1="335" x2="470" y2="358"/>
  </g>

  <!-- Arena types row -->
  <line x1="60" y1="574" x2="740" y2="574" stroke="#ef4444" stroke-width="0.75" opacity="0.3"/>
  <text x="400" y="600" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" text-anchor="middle" letter-spacing="3">ARENA TYPES</text>

  <g font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">
    <rect x="80" y="618" width="116" height="30" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <text x="138" y="638" fill="#94a3b8">competitive</text>

    <rect x="214" y="618" width="116" height="30" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
    <text x="272" y="638" fill="#94a3b8">chess</text>

    <rect x="348" y="618" width="104" height="30" rx="4" fill="#0f172a" stroke="#8b5cf6" stroke-width="1" opacity="0.7"/>
    <text x="400" y="638" fill="#94a3b8">bridge</text>

    <rect x="470" y="618" width="116" height="30" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1" opacity="0.7"/>
    <text x="528" y="638" fill="#94a3b8">coding</text>

    <rect x="604" y="618" width="116" height="30" rx="4" fill="#0f172a" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <text x="662" y="638" fill="#94a3b8">long-horizon</text>
  </g>

  <!-- RL training label -->
  <text x="400" y="700" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8" text-anchor="middle" letter-spacing="2">self-play reinforcement learning</text>
  <text x="400" y="722" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="1">long-horizon programming tasks</text>

  <!-- episode counter -->
  <text x="400" y="760" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" text-anchor="middle" letter-spacing="2">episode: 24,800 / reward: +0.84</text>
</svg>
