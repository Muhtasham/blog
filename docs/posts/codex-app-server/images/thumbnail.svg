<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 0 7, 9 3.5" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="800" height="800" fill="#0d1117"/>
  <rect width="800" height="800" fill="url(#glow)"/>

  <!-- THREAD -->
  <rect x="100" y="115" width="600" height="130" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <rect x="100" y="115" width="600" height="40" rx="8" fill="#1d4ed8" opacity="0.3"/>
  <rect x="100" y="143" width="600" height="12" fill="#1d4ed8" opacity="0.3"/>
  <text x="400" y="146" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="4">THREAD</text>
  <text x="400" y="185" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8" text-anchor="middle">durable state</text>
  <text x="400" y="207" font-family="ui-monospace, monospace" font-size="12" fill="#475569" text-anchor="middle">resumable · forkable · archived</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="249" x2="400" y2="277" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- TURN -->
  <rect x="100" y="285" width="600" height="130" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <rect x="100" y="285" width="600" height="40" rx="8" fill="#1d4ed8" opacity="0.3"/>
  <rect x="100" y="313" width="600" height="12" fill="#1d4ed8" opacity="0.3"/>
  <text x="400" y="316" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="4">TURN</text>
  <text x="400" y="355" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8" text-anchor="middle">bounded work unit</text>
  <text x="400" y="377" font-family="ui-monospace, monospace" font-size="12" fill="#475569" text-anchor="middle">user-initiated · plan · execute · review</text>

  <!-- Arrow 2 -->
  <line x1="400" y1="419" x2="400" y2="447" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ITEM -->
  <rect x="100" y="455" width="600" height="130" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <rect x="100" y="455" width="600" height="40" rx="8" fill="#1d4ed8" opacity="0.3"/>
  <rect x="100" y="483" width="600" height="12" fill="#1d4ed8" opacity="0.3"/>
  <text x="400" y="486" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#93c5fd" text-anchor="middle" letter-spacing="4">ITEM</text>
  <text x="400" y="525" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8" text-anchor="middle">atomic I/O unit</text>
  <text x="400" y="547" font-family="ui-monospace, monospace" font-size="12" fill="#475569" text-anchor="middle">started -> delta -> completed</text>

  <!-- Event stream -->
  <g font-family="ui-monospace, monospace" font-size="12" text-anchor="middle">
    <text x="138" y="621" fill="#1d4ed8" opacity="0.9">started</text>
    <rect x="180" y="632" width="55" height="3" rx="1.5" fill="#1d4ed8" opacity="0.4"/>
    <text x="264" y="621" fill="#0891b2" opacity="0.85">delta</text>
    <rect x="288" y="632" width="75" height="3" rx="1.5" fill="#0891b2" opacity="0.4"/>
    <text x="390" y="621" fill="#0891b2" opacity="0.8">delta</text>
    <rect x="414" y="632" width="60" height="3" rx="1.5" fill="#0891b2" opacity="0.4"/>
    <text x="500" y="621" fill="#0891b2" opacity="0.7">delta</text>
    <rect x="522" y="632" width="45" height="3" rx="1.5" fill="#0891b2" opacity="0.4"/>
    <text x="610" y="621" fill="#10b981" opacity="0.9">completed</text>
    <rect x="665" y="632" width="38" height="3" rx="1.5" fill="#10b981" opacity="0.4"/>
  </g>

  <!-- Approval gate -->
  <rect x="190" y="649" width="420" height="36" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1.25" stroke-dasharray="5 3"/>
  <text x="400" y="673" font-family="ui-monospace, monospace" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle" letter-spacing="2">APPROVAL GATE · allow · deny · log</text>
</svg>
