<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow-welcome" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#052e16" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="#0d1117"/>
  <rect width="800" height="800" fill="url(#glow-welcome)"/>

  <!-- Title -->
