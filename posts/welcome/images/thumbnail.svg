  <g font-family="ui-monospace, monospace" font-size="11">
    <text x="108" y="563" fill="#22c55e" opacity="0.5">neural_networks</text>
    <text x="108" y="585" fill="#22c55e" opacity="0.4">information_theory</text>
    <text x="108" y="607" fill="#22c55e" opacity="0.3">transformers</text>
    <text x="490" y="563" fill="#22c55e" opacity="0.5">gradient_descent</text>
    <text x="490" y="585" fill="#22c55e" opacity="0.4">backpropagation</text>
    <text x="490" y="607" fill="#22c55e" opacity="0.3">attention</text>
  </g>

  <!-- Bottom tags -->
  <line x1="80" y1="628" x2="720" y2="628" stroke="#22c55e" stroke-width="0.75" opacity="0.3"/>
  <g font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">
    <rect x="80"  y="642" width="120" height="26" rx="4" fill="#020d06" stroke="#22c55e" stroke-width="1"/>
    <text x="140" y="660" fill="#94a3b8">ML research</text>
    <rect x="214" y="642" width="100" height="26" rx="4" fill="#020d06" stroke="#22c55e" stroke-width="1"/>
    <text x="264" y="660" fill="#94a3b8">papers</text>
    <rect x="328" y="642" width="120" height="26" rx="4" fill="#020d06" stroke="#22c55e" stroke-width="1"/>
    <text x="388" y="660" fill="#94a3b8">conferences</text>
    <rect x="462" y="642" width="100" height="26" rx="4" fill="#020d06" stroke="#22c55e" stroke-width="1"/>
    <text x="512" y="660" fill="#94a3b8">tutorials</text>
    <rect x="576" y="642" width="100" height="26" rx="4" fill="#020d06" stroke="#22c55e" stroke-width="1"/>
    <text x="626" y="660" fill="#94a3b8">musings</text>
  </g>

  <text x="400" y="712" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8" text-anchor="middle" letter-spacing="2">start of a machine learning journey</text>
  <text x="400" y="734" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle">Quarto · Python · PyTorch · transformers · curiosity</text>
