  <rect x="80" y="102" width="640" height="36" rx="10" fill="#0a1f0e" stroke="#22c55e" stroke-width="2"/>
  <rect x="80" y="120" width="640" height="18" fill="#0a1f0e"/>
  <!-- Traffic lights -->
  <circle cx="108" cy="120" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="130" cy="120" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="152" cy="120" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="400" y="126" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" text-anchor="middle">terminal — ml-blog</text>

  <!-- Line 1 -->
  <text x="108" y="168" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e">$</text>
  <text x="126" y="168" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0"> git init ml-blog</text>
  <text x="108" y="190" font-family="ui-monospace, monospace" font-size="12" fill="#4b5563">Initialized empty Git repository in ~/ml-blog/.git/</text>

  <!-- Line 2 -->
  <text x="108" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e">$</text>
  <text x="126" y="220" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0"> quarto new post welcome</text>
  <text x="108" y="242" font-family="ui-monospace, monospace" font-size="12" fill="#4b5563">Creating post: posts/welcome/index.qmd</text>

  <!-- Line 3 -->
  <text x="108" y="272" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e">$</text>
  <text x="126" y="272" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0"> pip install transformers torch</text>
  <text x="108" y="294" font-family="ui-monospace, monospace" font-size="12" fill="#4b5563">Successfully installed transformers-4.36.0</text>

  <!-- Line 4 -->
  <text x="108" y="324" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e">$</text>
  <text x="126" y="324" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0"> echo "machine learning &amp; information theory"</text>
  <text x="108" y="346" font-family="ui-monospace, monospace" font-size="12" fill="#22c55e">machine learning &amp; information theory</text>

  <!-- Line 5 -->
  <text x="108" y="376" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e">$</text>
  <text x="126" y="376" font-family="ui-monospace, monospace" font-size="13" fill="#e2e8f0"> quarto preview</text>
  <text x="108" y="398" font-family="ui-monospace, monospace" font-size="12" fill="#4b5563">Browse at http://localhost:4321/</text>

  <!-- Active cursor line -->
  <text x="108" y="436" font-family="ui-monospace, monospace" font-size="13" fill="#22c55e">$</text>
  <rect x="126" y="420" width="9" height="18" fill="#22c55e" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

