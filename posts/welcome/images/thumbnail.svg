  <text x="400" y="80" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" text-anchor="middle" letter-spacing="3">ML BLOG  ·  MACHINE LEARNING JOURNEY</text>

  <!-- Terminal window -->
  <rect x="80" y="102" width="640" height="430" rx="10" fill="#020d06" stroke="#22c55e" stroke-width="2"/>
