<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow-bootcamp" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="#0d1117"/>
  <rect width="800" height="800" fill="url(#glow-bootcamp)"/>

  <!-- Title -->
  <text x="400" y="66" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#3b82f6" text-anchor="middle" letter-spacing="4">LLM BOOTCAMP</text>
  <text x="400" y="88" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" text-anchor="middle" letter-spacing="3">SF  ·  AI APPLICATION STACK</text>

  <!-- Pipeline: 5 stacked layers -->
  <!-- Layer 1: User Input / Prompt -->
  <rect x="120" y="118" width="560" height="72" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="147" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" letter-spacing="2">INPUT</text>
  <text x="160" y="168" font-family="ui-monospace, monospace" font-size="12" fill="#3b82f6">&gt; "Summarize the latest research on transformers..."</text>
  <text x="648" y="162" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" text-anchor="end">prompt</text>

  <!-- Arrow 1 -->
  <line x1="400" y1="190" x2="400" y2="214" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="394,214 400,224 406,214" fill="#3b82f6"/>

  <!-- Layer 2: Prompt Engineering -->
  <rect x="120" y="224" width="560" height="72" rx="8" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="160" y="253" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" letter-spacing="2">PROMPT ENGINEERING</text>
  <g font-family="ui-monospace, monospace" font-size="10" fill="#60a5fa">
    <text x="160" y="278">few-shot  ·  chain-of-thought  ·  system prompt  ·  RAG</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="400" y1="296" x2="400" y2="320" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="394,320 400,330 406,320" fill="#3b82f6"/>

  <!-- Layer 3: LLM (main model block, brightest) -->
  <rect x="120" y="330" width="560" height="100" rx="8" fill="#0c1a30" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="160" y="360" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" letter-spacing="2">FOUNDATION MODEL</text>
  <!-- Mini transformer diagram inside -->
  <g fill="#1e3a5f" stroke="#3b82f6" stroke-width="1">
    <rect x="180" y="372" width="40" height="36" rx="3"/>
    <rect x="234" y="372" width="40" height="36" rx="3"/>
    <rect x="288" y="372" width="40" height="36" rx="3"/>
    <rect x="342" y="372" width="40" height="36" rx="3"/>
    <rect x="396" y="372" width="40" height="36" rx="3"/>
    <rect x="450" y="372" width="40" height="36" rx="3"/>
    <rect x="504" y="372" width="40" height="36" rx="3"/>
    <rect x="558" y="372" width="40" height="36" rx="3"/>
  </g>
  <g font-family="ui-monospace, monospace" font-size="8" fill="#3b82f6" text-anchor="middle">
    <text x="200" y="394">attn</text>
    <text x="254" y="394">FFN</text>
    <text x="308" y="394">attn</text>
    <text x="362" y="394">FFN</text>
    <text x="416" y="394">attn</text>
    <text x="470" y="394">FFN</text>
    <text x="524" y="394">attn</text>
    <text x="578" y="394">FFN</text>
  </g>
  <text x="648" y="428" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" text-anchor="end">32 layers</text>

  <!-- Arrow 3 -->
  <line x1="400" y1="430" x2="400" y2="454" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="394,454 400,464 406,454" fill="#3b82f6"/>

  <!-- Layer 4: Post-processing -->
  <rect x="120" y="464" width="560" height="72" rx="8" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="160" y="493" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" letter-spacing="2">POST-PROCESSING</text>
  <text x="160" y="518" font-family="ui-monospace, monospace" font-size="10" fill="#60a5fa">sampling  ·  temperature  ·  top-p  ·  beam search</text>

  <!-- Arrow 4 -->
  <line x1="400" y1="536" x2="400" y2="560" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="394,560 400,570 406,560" fill="#3b82f6"/>

  <!-- Layer 5: Application -->
  <rect x="120" y="570" width="560" height="72" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="599" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" letter-spacing="2">APPLICATION</text>
  <text x="160" y="624" font-family="ui-monospace, monospace" font-size="12" fill="#3b82f6">&lt; "Transformers revolutionized NLP by introducing..."</text>

  <!-- Open-source models row -->
  <line x1="60" y1="672" x2="740" y2="672" stroke="#1d4ed8" stroke-width="0.75" opacity="0.3"/>
  <text x="400" y="696" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="3">OPEN-SOURCE LLMs</text>
  <g font-family="ui-monospace, monospace" font-size="10" text-anchor="middle">
    <rect x="82" y="710" width="90" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="127" y="728" fill="#94a3b8">Llama</text>
    <rect x="186" y="710" width="90" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="231" y="728" fill="#94a3b8">Mistral</text>
    <rect x="290" y="710" width="90" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="335" y="728" fill="#94a3b8">Falcon</text>
    <rect x="394" y="710" width="90" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="439" y="728" fill="#94a3b8">MPT</text>
    <rect x="498" y="710" width="90" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="543" y="728" fill="#94a3b8">BLOOM</text>
    <rect x="602" y="710" width="116" height="26" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="660" y="728" fill="#94a3b8">StarCoder</text>
  </g>

  <text x="400" y="770" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle">prompt engineering · fine-tuning · deployment</text>
</svg>
