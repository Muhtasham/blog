<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow-compiler" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#3d1a00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="#0d1117"/>
  <rect width="800" height="800" fill="url(#glow-compiler)"/>

  <!-- Title -->
  <text x="400" y="64" font-family="ui-monospace, monospace" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="4">COMPILER OPTIMIZATION</text>
  <text x="400" y="86" font-family="ui-monospace, monospace" font-size="10" fill="#4b5563" text-anchor="middle" letter-spacing="3">LLM + LLVM  ·  CODE SIZE REDUCTION</text>

  <!-- Input IR code block (left) -->
  <text x="148" y="126" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="2">INPUT IR</text>
  <rect x="60" y="138" width="216" height="340" rx="6" fill="#0a0d12" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- IR code lines -->
  <g font-family="ui-monospace, monospace" font-size="9" fill="#78350f">
    <text x="76" y="164">define i32 @compute(</text>
    <text x="76" y="180">  i32 %a, i32 %b) {</text>
    <text x="76" y="196">entry:</text>
    <text x="76" y="212">  %t0 = alloca i32</text>
    <text x="76" y="228">  %t1 = alloca i32</text>
    <text x="76" y="244">  store i32 %a, i32* %t0</text>
    <text x="76" y="260">  store i32 %b, i32* %t1</text>
    <text x="76" y="276">  %v0 = load i32, i32* %t0</text>
    <text x="76" y="292">  %v1 = load i32, i32* %t1</text>
    <text x="76" y="308">  %sum = add i32 %v0, %v1</text>
    <text x="76" y="324">  %t2 = alloca i32</text>
    <text x="76" y="340">  store i32 %sum, i32* %t2</text>
    <text x="76" y="356">  %res = load i32, i32*%t2</text>
    <text x="76" y="372">  %out = mul i32 %res, 2</text>
    <text x="76" y="388">  %fin = add i32 %out, 0</text>
    <text x="76" y="404">  ret i32 %fin</text>
    <text x="76" y="420">}</text>
    <text x="76" y="448">; 17 instructions</text>
    <text x="76" y="464">; 42 bytes</text>
  </g>

  <!-- Line count badge -->
  <rect x="152" y="460" width="100" height="24" rx="4" fill="#3d1a00" stroke="#f59e0b" stroke-width="1"/>
  <text x="202" y="477" font-family="ui-monospace, monospace" font-size="9" fill="#f59e0b" text-anchor="middle">17 instructions</text>

  <!-- Arrow through transformer -->
  <line x1="278" y1="308" x2="318" y2="308" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.7"/>
  <polygon points="318,304 328,308 318,312" fill="#f59e0b"/>

  <!-- Transformer block (center) -->
  <rect x="330" y="196" width="140" height="224" rx="8" fill="#0a0d12" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="224" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="2">TRANSFORMER</text>

  <!-- Layers inside -->
  <g fill="#1c0f00" stroke="#f59e0b" stroke-width="1">
    <rect x="346" y="236" width="108" height="22" rx="3"/>
    <rect x="346" y="266" width="108" height="22" rx="3"/>
    <rect x="346" y="296" width="108" height="22" rx="3"/>
    <rect x="346" y="326" width="108" height="22" rx="3"/>
    <rect x="346" y="356" width="108" height="22" rx="3"/>
  </g>
  <g font-family="ui-monospace, monospace" font-size="8" fill="#f59e0b" text-anchor="middle">
    <text x="400" y="252">self-attention</text>
    <text x="400" y="282">layer norm</text>
    <text x="400" y="312">feed-forward</text>
    <text x="400" y="342">layer norm</text>
    <text x="400" y="372">× 32 layers</text>
  </g>

  <text x="400" y="408" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle">7B params</text>
  <text x="400" y="422" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle">LLVM passes</text>

  <!-- Arrow out of transformer -->
  <line x1="472" y1="308" x2="512" y2="308" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.7"/>
  <polygon points="512,304 522,308 512,312" fill="#f59e0b"/>

  <!-- Output IR (right, fewer lines = optimized) -->
  <text x="652" y="126" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="2">OPTIMIZED IR</text>
  <rect x="524" y="138" width="216" height="340" rx="6" fill="#0a0d12" stroke="#f59e0b" stroke-width="1.5"/>

  <g font-family="ui-monospace, monospace" font-size="9" fill="#f59e0b">
    <text x="540" y="164">define i32 @compute(</text>
    <text x="540" y="180">  i32 %a, i32 %b) {</text>
    <text x="540" y="196">entry:</text>
    <text x="540" y="212">  %sum = add i32 %a, %b</text>
    <text x="540" y="228">  %out = shl i32 %sum, 1</text>
    <text x="540" y="244">  ret i32 %out</text>
    <text x="540" y="260">}</text>
  </g>

  <!-- Empty / saved lines visual -->
  <g fill="none" stroke="#1c0f00" stroke-width="1" opacity="0.4" stroke-dasharray="40 4">
    <line x1="540" y1="275" x2="720" y2="275"/>
    <line x1="540" y1="291" x2="720" y2="291"/>
    <line x1="540" y1="307" x2="720" y2="307"/>
    <line x1="540" y1="323" x2="720" y2="323"/>
    <line x1="540" y1="339" x2="720" y2="339"/>
    <line x1="540" y1="355" x2="720" y2="355"/>
    <line x1="540" y1="371" x2="720" y2="371"/>
    <line x1="540" y1="387" x2="720" y2="387"/>
    <line x1="540" y1="403" x2="720" y2="403"/>
    <line x1="540" y1="419" x2="720" y2="419"/>
  </g>

  <!-- Optimized count badge -->
  <rect x="556" y="440" width="136" height="24" rx="4" fill="#1c0f00" stroke="#f59e0b" stroke-width="1"/>
  <text x="624" y="457" font-family="ui-monospace, monospace" font-size="9" fill="#fbbf24" text-anchor="middle">5 instructions (-71%)</text>

  <!-- Reduction metric -->
  <rect x="120" y="506" width="240" height="80" rx="8" fill="#0a0d12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="240" y="532" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="2">CODE SIZE REDUCTION</text>
  <text x="240" y="566" font-family="ui-monospace, monospace" font-size="34" font-weight="700" fill="#f59e0b" text-anchor="middle">-24%</text>
  <text x="240" y="580" font-family="ui-monospace, monospace" font-size="8" fill="#4b5563" text-anchor="middle">avg over LLVM test suite</text>

  <!-- Model info -->
  <rect x="440" y="506" width="240" height="80" rx="8" fill="#0a0d12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="560" y="532" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="2">MODEL</text>
  <text x="560" y="566" font-family="ui-monospace, monospace" font-size="24" font-weight="700" fill="#f59e0b" text-anchor="middle">7B params</text>
  <text x="560" y="580" font-family="ui-monospace, monospace" font-size="8" fill="#4b5563" text-anchor="middle">CodeLlama base  ·  LLVM IR</text>

  <!-- Pass names -->
  <text x="400" y="630" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle" letter-spacing="2">OPTIMIZATION PASSES</text>
  <g font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">
    <rect x="68" y="644" width="92" height="24" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="114" y="661" fill="#94a3b8">mem2reg</text>
    <rect x="174" y="644" width="88" height="24" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="218" y="661" fill="#94a3b8">instcombine</text>
    <rect x="276" y="644" width="88" height="24" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="320" y="661" fill="#94a3b8">dce</text>
    <rect x="378" y="644" width="88" height="24" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="422" y="661" fill="#94a3b8">inline</text>
    <rect x="480" y="644" width="88" height="24" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="524" y="661" fill="#94a3b8">loop-unroll</text>
    <rect x="582" y="644" width="150" height="24" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="657" y="661" fill="#94a3b8">vectorize</text>
  </g>

  <text x="400" y="710" font-family="ui-monospace, monospace" font-size="11" fill="#94a3b8" text-anchor="middle" letter-spacing="2">LLM-guided pass selection</text>
  <text x="400" y="730" font-family="ui-monospace, monospace" font-size="9" fill="#4b5563" text-anchor="middle">LLVM · IR optimization · 7B parameter model</text>
</svg>
